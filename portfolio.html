<!DOCTYPE html>

<head>

<!-- <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet"> -->

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#000,#1a1a1a);
    color:#fff;
}

/* NAVBAR */
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 60px;
    background:rgba(0,0,0,0.9);
    position:sticky;
    top:0;
}

nav h1{
    color:#d4af37;
}

.nav-links a{
    color:#fff;
    margin-left:25px;
    text-decoration:none;
    position:relative;
}

.nav-links a::after{
    content:"";
    position:absolute;
    width:0%;
    height:2px;
    background:#d4af37;
    left:0;
    bottom:-5px;
    transition:0.3s;
}

.nav-links a:hover::after{
    width:100%;
}

/* HEADER */
header{
    text-align:center;
    padding:60px 20px;
}

header h2{
    color:#d4af37;
    font-size:40px;
}

/* GALLERY */
.gallery{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:20px;
}

.gallery img{
    width:300px;
    height:350px;
    object-fit:cover;
    border-radius:15px;
    transition:0.4s;
    cursor:pointer;
}

.gallery img:hover{
    transform:scale(1.05);
    box-shadow:0 0 25px rgba(212,175,55,0.5);
}

/* FOOTER */
footer{
    background:#000;
    text-align:center;
    padding:20px;
    margin-top:40px;
}
</style>

</head>

<body>

<nav>

	<a href="about.html">About</a>

</nav>
